<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vibe Punch v1.8 — Left Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="common.css">
<style>
body{padding:14px;background:var(--bg)}
.container{max-width:320px;margin:0 auto}
.hdr{
  font-family:'Orbitron';
  font-size:10px;
  font-weight:700;
  letter-spacing:2px;
  color:var(--t3);
  text-align:center;
  margin:0 0 12px;
  padding:8px;
  border:1px dashed var(--bd2);
}
.back-link{
  display:inline-block;
  padding:6px 12px;
  font-family:'Orbitron';
  font-size:10px;
  font-weight:700;
  letter-spacing:1.5px;
  color:var(--t2);
  border:1px solid var(--bd2);
  text-decoration:none;
  margin:0 0 12px;
  transition:all .15s;
}
.back-link:hover{border-color:var(--p);color:var(--t1)}
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="back-link">❮ BACK TO LIST</a>
<div class="hdr">◆ LEFT PANEL · 280px FIXED</div>

<!-- Streak Fire -->
<div class="pnl" style="padding:12px">
<div style="position:relative;height:75px;display:flex;justify-content:center;align-items:flex-end">
  <div class="flame" style="left:10%;width:14px;height:28px;background:linear-gradient(to top,#ff4422,#ff8800,#ffcc00);animation-delay:0s"></div>
  <div class="flame" style="left:22%;width:16px;height:38px;background:linear-gradient(to top,#ff2200,#ff6600,#ffaa00);animation-delay:.1s"></div>
  <div class="flame" style="left:36%;width:18px;height:46px;background:linear-gradient(to top,#ff4422,#ff8800,#ffee00);animation-delay:.22s"></div>
  <div class="flame" style="right:36%;width:17px;height:44px;background:linear-gradient(to top,#ff2200,#ff7700,#ffcc00);animation-delay:.06s"></div>
  <div class="flame" style="right:22%;width:15px;height:36px;background:linear-gradient(to top,#ff4422,#ff8800,#ffaa00);animation-delay:.18s"></div>
  <div class="flame" style="right:10%;width:13px;height:26px;background:linear-gradient(to top,#ff2200,#ff6600,#ffee00);animation-delay:.3s"></div>
  <div class="emb" style="left:18%;bottom:45px;animation-delay:0s"></div>
  <div class="emb" style="left:42%;bottom:55px;animation-delay:.5s"></div>
  <div class="emb" style="left:65%;bottom:42px;animation-delay:1s"></div>
  <div class="emb" style="left:50%;bottom:60px;animation-delay:1.4s"></div>
  <div style="position:relative;z-index:2;text-align:center">
    <div style="font-family:'Orbitron';font-size:30px;font-weight:900;color:#fff;text-shadow:0 0 18px rgba(255,100,0,0.5),0 2px 6px rgba(0,0,0,0.5);line-height:1">7</div>
    <div style="font-family:'Orbitron';font-size:10px;font-weight:700;letter-spacing:2px;color:var(--gd)">WEEK STREAK</div>
  </div>
</div>
</div>

<!-- Modifier / Setting toggle -->
<div class="pnl">
<div class="tog">
  <button class="tog-b disabled" title="v1.9에서 활성화 예정">MODIFIER</button>
  <button class="tog-b on">SETTING</button>
</div>

<!-- Setting -->
<div>
  <div class="set-item"><span>Graphic</span><em>Resolution</em></div>
  <div class="set-item"><span>Mode</span><em>Manual</em></div>
  <div class="set-item"><span>Render Scale</span><em>1.0x</em></div>
  <div class="set-item"><span>Sound</span><em>100%</em></div>
  <div class="set-item"><span>Controllers</span><em>Default</em></div>
  <div class="set-item"><span>Display</span><em>72 Hz</em></div>
</div>
</div>

<!-- Notes -->
<div style="margin:16px 0 0;padding:10px;background:rgba(18,12,45,0.4);border:1px dashed var(--bd2);font-size:10px;color:var(--t3);line-height:1.6">
  <strong style="color:var(--gd);font-family:Orbitron;letter-spacing:1.5px;font-size:10px">◆ v1.8 CHANGES</strong><br>
  • MODIFIER 토글 비활성 (v1.9 슬롯)<br>
  • Streak 숫자 = FIST 기준 통합<br>
  • 애니메이션 불꽃 유지
</div>

</div>
</body>
</html>
